<!DOCTYPE html>
<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Felipa&family=Modern+Antiqua&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h2 id="mainTitle">Dice Rolling Sim</h2>
        <div id="main-container">
            <div id="main-roll">   
                <h3 id="outputText">You rolled a: <span id="roll"></span></h3>
                
                <div id="dieContainer">
                    <button class="dieButton" onclick="d4()">D4</button>
                    <button class="dieButton" onclick="d6()">D6</button>
                    <button class="dieButton" onclick="d8()">D8</button>
                    <button class="dieButton" onclick="d10()">D10</button>
                    <button class="dieButton" onclick="d12()">D12</button>
                    <button class="dieButton" onclick="d20()">D20</button>
                </div>
            </div>
            <div id="log">
                <h3 style="text-align: center;">Previous Rolls:</h3>
                <ul id="previous-rolls">
                </ul>
            </div>
            
        </div>

        <script src="index.js"></script>
    </body>
</html>
